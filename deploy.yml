name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "CNAME.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        run: node test.js

      - name: Verify critical files exist
        run: |
          test -f index.html || (echo "ERROR: index.html missing" && exit 1)
          test -f CNAME || (echo "ERROR: CNAME missing" && exit 1)
          test -f robots.txt || (echo "ERROR: robots.txt missing" && exit 1)
          test -f sitemap.xml || (echo "ERROR: sitemap.xml missing" && exit 1)
          test -f tools/pdf-to-png/index.html || (echo "ERROR: tools/pdf-to-png/index.html missing" && exit 1)
          test -f tools/merge-pdf/index.html || (echo "ERROR: tools/merge-pdf/index.html missing" && exit 1)
          test -f tools/split-pdf/index.html || (echo "ERROR: tools/split-pdf/index.html missing" && exit 1)
          test -f tools/protect-pdf/index.html || (echo "ERROR: tools/protect-pdf/index.html missing" && exit 1)
          test -f tools/images-to-pdf/index.html || (echo "ERROR: tools/images-to-pdf/index.html missing" && exit 1)
          test -f tools/add-page-numbers/index.html || (echo "ERROR: tools/add-page-numbers/index.html missing" && exit 1)
          echo "All critical files verified."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
