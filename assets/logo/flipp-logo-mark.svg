<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <defs>
    <!-- Purple gradient for the flipped back of the page -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b3fa6;stop-opacity:1" />
    </linearGradient>

    <!-- White-to-lavender gradient for the page front -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ddd6f3;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow/depth for curl -->
    <linearGradient id="curlShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a990d9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Purple back layer (revealed by the curl) -->
  <path d="M6 4 L18 4 L22 8 L22 24 L6 24 Z" fill="url(#purpleGrad)" rx="1"/>

  <!-- White page front (curling from bottom-right corner) -->
  <!-- Main page body -->
  <path d="M6 4 L17 4 L17 17 Q17 24 10 24 L6 24 Z" fill="url(#pageGrad)"/>

  <!-- Curl triangle (the folded-back corner) -->
  <path d="M17 17 L22 24 L10 24 Q17 24 17 17 Z" fill="url(#curlShadow)"/>

  <!-- Dog-ear fold top-right corner -->
  <path d="M17 4 L22 8 L17 8 Z" fill="#ddd6f3"/>

  <!-- Document lines on the white page -->
  <rect x="9" y="8" width="6" height="1.2" rx="0.6" fill="#b0a8cc" opacity="0.7"/>
  <rect x="9" y="11" width="5" height="1.2" rx="0.6" fill="#b0a8cc" opacity="0.5"/>

  <!-- Shield icon on purple area -->
  <!-- Shield body -->
  <path d="M14 15 C14 15 11.5 13.8 11.5 12 L11.5 10.5 L14 9.8 L16.5 10.5 L16.5 12 C16.5 13.8 14 15 14 15 Z"
        fill="#c9b8f0" opacity="0.9"/>

  <!-- Keyhole in shield -->
  <circle cx="14" cy="11.8" r="0.9" fill="#5b3fa6"/>
  <rect x="13.6" y="12.3" width="0.8" height="1" rx="0.3" fill="#5b3fa6"/>
</svg>
